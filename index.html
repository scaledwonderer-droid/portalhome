<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="color-scheme" content="dark">
  <title>Cyber Train Links</title>

  <style>
    :root {
      --label-bg: rgba(5, 9, 19, 0.84);
      --label-border: rgba(174, 225, 255, 0.46);
      --label-text: #f7fbff;
      --transition: 180ms ease;
    }

    * { box-sizing: border-box; }

    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
      background:
        radial-gradient(circle at 50% 42%, #12182a 0%, #070910 58%, #020307 100%);
    }

    body {
      min-height: 100svh;
      display: grid;
      place-items: center;
      overflow: hidden;
      color: var(--label-text);
      font-family: Inter, "Noto Sans JP", "Yu Gothic UI", "Yu Gothic", Meiryo, sans-serif;
    }

    .page {
      width: 100vw;
      height: 100svh;
      display: grid;
      place-items: center;
      padding:
        env(safe-area-inset-top)
        env(safe-area-inset-right)
        env(safe-area-inset-bottom)
        env(safe-area-inset-left);
    }

    .scene {
      position: relative;
      width: min(100vw, calc(100svh * 1672 / 941));
      aspect-ratio: 1672 / 941;
      max-height: 100svh;
      overflow: hidden;
      background: #03050a;
      user-select: none;
      -webkit-user-select: none;
      touch-action: manipulation;
      cursor: default;
    }

    .background {
      position: absolute;
      inset: 0;
      display: block;
      width: 100%;
      height: 100%;
      object-fit: fill;
      pointer-events: none;
    }

    .highlight-layer {
      position: absolute;
      inset: 0;
      display: block;
      width: 100%;
      height: 100%;
      opacity: 0;
      pointer-events: none;
      transition: opacity var(--transition);
      mix-blend-mode: screen;
      filter:
        brightness(1.46)
        contrast(1.08)
        saturate(1.20)
        drop-shadow(0 0 2px rgba(235, 250, 255, 1))
        drop-shadow(0 0 7px rgba(170, 229, 255, 0.98))
        drop-shadow(0 0 16px rgba(91, 174, 255, 0.88))
        drop-shadow(0 0 30px rgba(89, 103, 255, 0.52));
    }

    .highlight-layer.is-visible {
      opacity: 1;
    }

    .destination-label {
      position: absolute;
      left: 50%;
      bottom: clamp(14px, 3.2vw, 42px);
      z-index: 20;
      max-width: min(88%, 760px);
      padding: 11px 18px 12px;
      border: 1px solid var(--label-border);
      border-radius: 999px;
      background: var(--label-bg);
      box-shadow:
        0 0 24px rgba(83, 156, 255, 0.18),
        inset 0 0 16px rgba(154, 216, 255, 0.04);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      color: var(--label-text);
      font-size: clamp(13px, 1.25vw, 20px);
      font-weight: 600;
      letter-spacing: 0.08em;
      line-height: 1.35;
      text-align: center;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      opacity: 0;
      transform: translate(-50%, 10px);
      transition: opacity var(--transition), transform var(--transition);
      pointer-events: none;
    }

    .destination-label.is-visible {
      opacity: 1;
      transform: translate(-50%, 0);
    }

    .tap-guide {
      position: absolute;
      left: 50%;
      bottom: calc(clamp(14px, 3.2vw, 42px) + 52px);
      z-index: 20;
      padding: 5px 10px;
      border-radius: 999px;
      background: rgba(3, 7, 15, 0.76);
      color: rgba(234, 246, 255, 0.84);
      font-size: 11px;
      letter-spacing: 0.04em;
      opacity: 0;
      transform: translate(-50%, 8px);
      transition: opacity var(--transition), transform var(--transition);
      pointer-events: none;
    }

    .tap-guide.is-visible {
      opacity: 1;
      transform: translate(-50%, 0);
    }

    .loading-message {
      position: absolute;
      inset: 0;
      z-index: 30;
      display: grid;
      place-items: center;
      padding: 24px;
      background: #090b11;
      color: #fff;
      text-align: center;
      line-height: 1.8;
    }

    .loading-message[hidden] { display: none; }

    .keyboard-links {
      position: fixed;
      left: -10000px;
      top: auto;
      width: 1px;
      height: 1px;
      overflow: hidden;
    }

    @media (hover: none), (pointer: coarse) {
      .destination-label {
        bottom: max(18px, env(safe-area-inset-bottom));
      }

      .tap-guide {
        bottom: calc(max(18px, env(safe-area-inset-bottom)) + 49px);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .highlight-layer,
      .destination-label,
      .tap-guide {
        transition: none;
      }
    }
  </style>
</head>

<body>
  <main class="page">
    <div
      class="scene"
      id="scene"
      role="application"
      aria-label="サイバーパンク列車のリンク画面。人物を選択すると対応するリンクへ移動します。"
    >
      <img
        class="background"
        id="backgroundImage"
        src="./cyber-train.png"
        width="1672"
        height="941"
        alt="サイバーパンク都市を走る列車内の5人"
        draggable="false"
      >

      <canvas class="highlight-layer" width="1672" height="941" aria-hidden="true"></canvas>
      <canvas class="highlight-layer" width="1672" height="941" aria-hidden="true"></canvas>
      <canvas class="highlight-layer" width="1672" height="941" aria-hidden="true"></canvas>
      <canvas class="highlight-layer" width="1672" height="941" aria-hidden="true"></canvas>
      <canvas class="highlight-layer" width="1672" height="941" aria-hidden="true"></canvas>

      <div class="destination-label" id="destinationLabel" role="status" aria-live="polite"></div>
      <div class="tap-guide" id="tapGuide" aria-hidden="true">もう一度タップして移動</div>
      <div class="loading-message" id="loadingMessage">画像とマスクを読み込んでいます…</div>
    </div>

    <nav class="keyboard-links" aria-label="リンク一覧">
      <a href="https://example.com/photography">Photography Gallery</a>
      <a href="https://example.com/novels">Novel Archive</a>
      <a href="https://example.com/creative">Creative Works</a>
      <a href="https://example.com/music">Music Channel</a>
      <a href="https://example.com/social">Social Media</a>
    </nav>
  </main>

  <script>
    (() => {
      "use strict";

      const WIDTH = 1672;
      const HEIGHT = 941;
      const ALPHA_THRESHOLD = 34;

      /*
       * 左から順番に設定します。
       * url   : 実際のリンク先
       * label : 画面に表示するリンク先名称
       * mask  : masksフォルダ内の白黒マスク画像
       */
      const characters = [
        {
          mask: "./masks/character-01.png",
          url: "https://example.com/photography",
          label: "Photography Gallery"
        },
        {
          mask: "./masks/character-02.png",
          url: "https://example.com/novels",
          label: "Novel Archive"
        },
        {
          mask: "./masks/character-03.png",
          url: "https://example.com/creative",
          label: "Creative Works"
        },
        {
          mask: "./masks/character-04.png",
          url: "https://example.com/music",
          label: "Music Channel"
        },
        {
          mask: "./masks/character-05.png",
          url: "https://example.com/social",
          label: "Social Media"
        }
      ];

      const scene = document.getElementById("scene");
      const backgroundImage = document.getElementById("backgroundImage");
      const canvases = [...document.querySelectorAll(".highlight-layer")];
      const label = document.getElementById("destinationLabel");
      const tapGuide = document.getElementById("tapGuide");
      const loadingMessage = document.getElementById("loadingMessage");
      const keyboardLinks = [...document.querySelectorAll(".keyboard-links a")];

      const isTouchLike = window.matchMedia("(hover: none), (pointer: coarse)").matches;

      let activeIndex = -1;
      let selectedIndex = -1;
      let ready = false;
      let pointerInside = false;

      function loadImage(src) {
        return new Promise((resolve, reject) => {
          const image = new Image();
          image.decoding = "async";
          image.onload = () => resolve(image);
          image.onerror = () => reject(new Error(`読み込み失敗: ${src}`));
          image.src = src;
        });
      }

      function waitForBackground() {
        if (backgroundImage.complete && backgroundImage.naturalWidth > 0) {
          return Promise.resolve(backgroundImage);
        }

        return new Promise((resolve, reject) => {
          backgroundImage.addEventListener("load", () => resolve(backgroundImage), { once: true });
          backgroundImage.addEventListener(
            "error",
            () => reject(new Error("cyber-train.pngを読み込めませんでした。")),
            { once: true }
          );
        });
      }

      function createMaskAlpha(maskImage) {
        const canvas = document.createElement("canvas");
        canvas.width = WIDTH;
        canvas.height = HEIGHT;

        const context = canvas.getContext("2d", { willReadFrequently: true });
        context.drawImage(maskImage, 0, 0, WIDTH, HEIGHT);

        const imageData = context.getImageData(0, 0, WIDTH, HEIGHT);
        const data = imageData.data;
        const alpha = new Uint8ClampedArray(WIDTH * HEIGHT);

        for (let pixel = 0, index = 0; pixel < alpha.length; pixel += 1, index += 4) {
          const luminance = Math.round(
            data[index] * 0.2126 +
            data[index + 1] * 0.7152 +
            data[index + 2] * 0.0722
          );

          alpha[pixel] = luminance;
        }

        return alpha;
      }

      function buildHighlight(canvas, maskImage) {
        const context = canvas.getContext("2d");
        context.clearRect(0, 0, WIDTH, HEIGHT);

        // 元絵を描き、白黒マスクの明度を透明度として適用します。
        context.drawImage(backgroundImage, 0, 0, WIDTH, HEIGHT);
        context.globalCompositeOperation = "destination-in";
        context.drawImage(maskImage, 0, 0, WIDTH, HEIGHT);
        context.globalCompositeOperation = "source-over";
      }

      function pointToImageCoordinates(event) {
        const rect = scene.getBoundingClientRect();

        return {
          x: Math.max(0, Math.min(WIDTH - 1, Math.floor((event.clientX - rect.left) * WIDTH / rect.width))),
          y: Math.max(0, Math.min(HEIGHT - 1, Math.floor((event.clientY - rect.top) * HEIGHT / rect.height)))
        };
      }

      function characterAt(x, y) {
        const pixel = y * WIDTH + x;

        // 人物が重なる場所では、画面上で右側にいる人物を優先します。
        for (let index = characters.length - 1; index >= 0; index -= 1) {
          if (characters[index].alpha[pixel] >= ALPHA_THRESHOLD) {
            return index;
          }
        }

        return -1;
      }

      function showCharacter(index, showTapGuide = false) {
        if (activeIndex === index && label.classList.contains("is-visible")) {
          tapGuide.classList.toggle("is-visible", showTapGuide);
          return;
        }

        canvases.forEach((canvas, canvasIndex) => {
          canvas.classList.toggle("is-visible", canvasIndex === index);
        });

        activeIndex = index;

        if (index < 0) {
          label.classList.remove("is-visible");
          tapGuide.classList.remove("is-visible");
          scene.style.cursor = "default";
          return;
        }

        label.textContent = characters[index].label;
        label.classList.add("is-visible");
        tapGuide.classList.toggle("is-visible", showTapGuide);
        scene.style.cursor = "pointer";
      }

      function clearSelection() {
        selectedIndex = -1;
        showCharacter(-1, false);
      }

      scene.addEventListener("pointerenter", () => {
        pointerInside = true;
      });

      scene.addEventListener("pointerleave", () => {
        pointerInside = false;

        if (!isTouchLike) {
          showCharacter(-1, false);
        }
      });

      scene.addEventListener("pointermove", (event) => {
        if (!ready || isTouchLike) {
          return;
        }

        const point = pointToImageCoordinates(event);
        showCharacter(characterAt(point.x, point.y), false);
      });

      scene.addEventListener("click", (event) => {
        if (!ready) {
          return;
        }

        const point = pointToImageCoordinates(event);
        const index = characterAt(point.x, point.y);

        if (index < 0) {
          if (isTouchLike) {
            clearSelection();
          }
          return;
        }

        if (!isTouchLike) {
          window.location.href = characters[index].url;
          return;
        }

        if (selectedIndex !== index) {
          selectedIndex = index;
          showCharacter(index, true);
          return;
        }

        window.location.href = characters[index].url;
      });

      keyboardLinks.forEach((link, index) => {
        link.href = characters[index].url;
        link.textContent = characters[index].label;

        link.addEventListener("focus", () => {
          if (ready) {
            showCharacter(index, false);
          }
        });

        link.addEventListener("blur", () => {
          if (ready && !pointerInside) {
            showCharacter(-1, false);
          }
        });
      });

      Promise.all([
        waitForBackground(),
        ...characters.map((character) => loadImage(character.mask))
      ])
        .then((loaded) => {
          const maskImages = loaded.slice(1);

          maskImages.forEach((maskImage, index) => {
            characters[index].alpha = createMaskAlpha(maskImage);
            buildHighlight(canvases[index], maskImage);
          });

          ready = true;
          loadingMessage.hidden = true;
        })
        .catch((error) => {
          console.error(error);
          loadingMessage.innerHTML =
            "画像を読み込めませんでした。<br>" +
            "index.html、cyber-train.png、masksフォルダの配置とファイル名を確認してください。";
        });
    })();
  </script>
</body>
</html>
