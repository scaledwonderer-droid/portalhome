<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="color-scheme" content="dark">
  <title>Cyber Train Links</title>

  <style>
    :root {
      --label-bg: rgba(5, 9, 19, 0.84);
      --label-border: rgba(174, 225, 255, 0.46);
      --label-text: #f7fbff;
      --transition: 180ms ease;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
      background:
        radial-gradient(circle at 50% 42%, #12182a 0%, #070910 58%, #020307 100%);
    }

    body {
      min-height: 100svh;
      display: grid;
      place-items: center;
      overflow: hidden;
      color: var(--label-text);
      font-family:
        Inter,
        "Noto Sans JP",
        "Yu Gothic UI",
        "Yu Gothic",
        Meiryo,
        sans-serif;
    }

    .page {
      width: 100vw;
      height: 100svh;
      display: grid;
      place-items: center;
      padding:
        env(safe-area-inset-top)
        env(safe-area-inset-right)
        env(safe-area-inset-bottom)
        env(safe-area-inset-left);
    }

    .scene {
      position: relative;
      width: min(100vw, calc(100svh * 1672 / 941));
      aspect-ratio: 1672 / 941;
      max-height: 100svh;
      overflow: hidden;
      background: #03050a;
      user-select: none;
      -webkit-user-select: none;
      touch-action: manipulation;
      cursor: default;
    }

    .background,
    .highlight-layer {
      position: absolute;
      inset: 0;
      display: block;
      width: 100%;
      height: 100%;
    }

    .background {
      z-index: 0;
      object-fit: fill;
      pointer-events: none;
    }


    /*
     * 窓外アニメーション
     * 追加画像は使わず、細い光と遠景の帯を低い不透明度で流します。
     * 人物や車内を邪魔しないよう、窓の上寄りだけに限定しています。
     */
    .window-motion {
      position: absolute;
      inset: 0;
      z-index: 1;
      overflow: hidden;
      pointer-events: none;
    }

    .window-panel {
      position: absolute;
      overflow: hidden;
      opacity: 0.34;
      mix-blend-mode: screen;
      filter: blur(0.35px) saturate(1.08);
      isolation: isolate;
    }

    .window-panel-left {
      left: 13.5%;
      top: 0.8%;
      width: 35.5%;
      height: 33%;
      clip-path: polygon(
        0 19%,
        11% 0,
        100% 0,
        100% 86%,
        94% 100%,
        7% 100%,
        0 82%
      );
    }

    .window-panel-center {
      left: 54.5%;
      top: 0;
      width: 27%;
      height: 29%;
      clip-path: polygon(
        0 0,
        100% 0,
        100% 82%,
        89% 100%,
        8% 100%,
        0 74%
      );
    }

    .window-panel-right {
      right: 0;
      top: 0;
      width: 21.5%;
      height: 42%;
      clip-path: polygon(
        0 0,
        100% 0,
        100% 100%,
        15% 100%,
        0 82%
      );
    }

    .city-flow,
    .light-flow {
      position: absolute;
      inset: -8% -110%;
      width: 320%;
      transform: translate3d(0, 0, 0);
      will-change: transform;
    }

    .city-flow {
      background:
        repeating-linear-gradient(
          90deg,
          transparent 0 30px,
          rgba(77, 127, 189, 0.11) 31px 33px,
          transparent 34px 68px,
          rgba(127, 84, 179, 0.09) 69px 73px,
          transparent 74px 112px
        ),
        linear-gradient(
          to bottom,
          rgba(85, 126, 181, 0.10),
          transparent 42%,
          rgba(70, 85, 143, 0.08) 68%,
          transparent
        );
      filter: blur(1.1px);
    }

    .light-flow {
      background:
        repeating-linear-gradient(
          90deg,
          transparent 0 105px,
          rgba(121, 215, 255, 0.22) 106px 108px,
          rgba(121, 215, 255, 0.05) 109px 126px,
          transparent 127px 238px,
          rgba(246, 102, 255, 0.14) 239px 242px,
          transparent 243px 362px
        );
      filter: blur(2.2px);
      opacity: 0.66;
    }

    .city-flow-slow {
      animation: window-slide-left 22s linear infinite;
    }

    .city-flow-medium {
      animation: window-slide-left 16s linear infinite;
    }

    .light-flow-medium {
      animation: window-slide-left 10s linear infinite;
    }

    .light-flow-fast {
      animation: window-slide-left 7s linear infinite;
    }

    @keyframes window-slide-left {
      from {
        transform: translate3d(0, 0, 0);
      }

      to {
        transform: translate3d(-33.333%, 0, 0);
      }
    }

    .highlight-layer {
      z-index: 2;
      opacity: 0;
      pointer-events: none;
      transition: opacity var(--transition);
      mix-blend-mode: screen;
      filter:
        brightness(1.50)
        contrast(1.08)
        saturate(1.22)
        drop-shadow(0 0 3px rgba(240, 252, 255, 1))
        drop-shadow(0 0 8px rgba(173, 231, 255, 0.98))
        drop-shadow(0 0 18px rgba(88, 174, 255, 0.92))
        drop-shadow(0 0 36px rgba(89, 103, 255, 0.56));
    }

    .highlight-layer.is-visible {
      opacity: 1;
    }

    .destination-label {
      position: absolute;
      left: 50%;
      bottom: clamp(14px, 3.2vw, 42px);
      z-index: 20;
      max-width: min(88%, 760px);
      padding: 11px 18px 12px;
      border: 1px solid var(--label-border);
      border-radius: 999px;
      background: var(--label-bg);
      box-shadow:
        0 0 24px rgba(83, 156, 255, 0.18),
        inset 0 0 16px rgba(154, 216, 255, 0.04);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      color: var(--label-text);
      font-size: clamp(13px, 1.25vw, 20px);
      font-weight: 600;
      letter-spacing: 0.08em;
      line-height: 1.35;
      text-align: center;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      opacity: 0;
      transform: translate(-50%, 10px);
      transition:
        opacity var(--transition),
        transform var(--transition);
      pointer-events: none;
    }

    .destination-label.is-visible {
      opacity: 1;
      transform: translate(-50%, 0);
    }

    .submenu {
      position: absolute;
      left: 50%;
      bottom: clamp(18px, 3.4vw, 46px);
      z-index: 25;
      width: min(90%, 620px);
      padding: 16px 54px 16px 18px;
      border: 1px solid rgba(163, 222, 255, 0.54);
      border-radius: 18px;
      background: rgba(5, 9, 18, 0.88);
      box-shadow:
        0 0 32px rgba(75, 159, 255, 0.22),
        inset 0 0 18px rgba(147, 215, 255, 0.05);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      opacity: 0;
      transform: translate(-50%, 14px) scale(0.985);
      transition:
        opacity var(--transition),
        transform var(--transition);
      pointer-events: none;
    }

    .submenu.is-visible {
      opacity: 1;
      transform: translate(-50%, 0) scale(1);
      pointer-events: auto;
    }

    .submenu-heading {
      margin-bottom: 10px;
      color: rgba(235, 248, 255, 0.92);
      font-size: clamp(12px, 1.05vw, 15px);
      font-weight: 700;
      letter-spacing: 0.08em;
      text-align: left;
    }

    .submenu-links {
      display: flex;
      flex-wrap: wrap;
      gap: 9px;
    }

    .submenu-links.is-stacked {
      display: grid;
      grid-template-columns: 1fr;
    }

    .submenu-links.is-stacked .submenu-link {
      width: 100%;
    }

    .coming-soon {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      width: 100%;
      border: 1px solid rgba(166, 223, 255, 0.18);
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.025);
      color: rgba(228, 242, 250, 0.68);
      font-size: clamp(13px, 1.05vw, 15px);
      font-weight: 600;
      letter-spacing: 0.08em;
      text-align: center;
    }

    .submenu-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 40px;
      padding: 9px 14px;
      border: 1px solid rgba(166, 223, 255, 0.30);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.045);
      color: #f6fbff;
      font-size: clamp(12px, 1vw, 14px);
      font-weight: 600;
      letter-spacing: 0.04em;
      text-decoration: none;
      transition:
        background 150ms ease,
        border-color 150ms ease,
        transform 150ms ease,
        box-shadow 150ms ease;
    }

    .submenu-link:hover,
    .submenu-link:focus-visible {
      background: rgba(126, 202, 255, 0.13);
      border-color: rgba(181, 230, 255, 0.72);
      box-shadow: 0 0 14px rgba(92, 179, 255, 0.26);
      transform: translateY(-1px);
      outline: none;
    }

    .submenu-link.is-disabled {
      cursor: default;
      opacity: 0.58;
      pointer-events: none;
    }

    .submenu-close {
      position: absolute;
      top: 10px;
      right: 12px;
      width: 32px;
      height: 32px;
      border: 1px solid rgba(166, 223, 255, 0.26);
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.04);
      color: rgba(245, 251, 255, 0.88);
      font-size: 20px;
      line-height: 1;
      cursor: pointer;
    }

    .submenu-close:hover,
    .submenu-close:focus-visible {
      background: rgba(126, 202, 255, 0.12);
      outline: none;
    }

    .loading-message {
      position: absolute;
      inset: 0;
      z-index: 30;
      display: grid;
      place-items: center;
      padding: 24px;
      background: #090b11;
      color: #fff;
      text-align: center;
      line-height: 1.8;
    }

    .loading-message[hidden] {
      display: none;
    }

    .keyboard-links {
      position: fixed;
      left: -10000px;
      top: auto;
      width: 1px;
      height: 1px;
      overflow: hidden;
    }

    @media (hover: none), (pointer: coarse) {
      .destination-label {
        bottom: max(18px, env(safe-area-inset-bottom));
      }

      .submenu {
        bottom: max(18px, env(safe-area-inset-bottom));
      }
    }

    @media (max-width: 640px) {
      .submenu {
        width: calc(100% - 24px);
        padding: 14px 48px 14px 14px;
      }

      .submenu-links {
        display: grid;
        grid-template-columns: 1fr;
      }

      .submenu-link {
        width: 100%;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .highlight-layer,
      .destination-label,
      .submenu {
        transition: none;
      }

      .city-flow,
      .light-flow {
        animation: none;
      }

      .window-motion {
        opacity: 0.45;
      }
    }
  </style>
</head>

<body>
  <main class="page">
    <div
      class="scene"
      id="scene"
      role="application"
      aria-label="サイバーパンク列車のリンク画面。人物を選択するとサブメニューが開きます。"
    >
      <img
        class="background"
        id="backgroundImage"
        src="./cyber-train.png"
        width="1672"
        height="941"
        alt="サイバーパンク都市を走る列車内の5人"
        draggable="false"
      >

      <!-- 窓外の走行感を出す、ごく控えめな光の流れ -->
      <div class="window-motion" aria-hidden="true">
        <div class="window-panel window-panel-left">
          <div class="city-flow city-flow-slow"></div>
          <div class="light-flow light-flow-fast"></div>
        </div>

        <div class="window-panel window-panel-center">
          <div class="city-flow city-flow-medium"></div>
          <div class="light-flow light-flow-fast"></div>
        </div>

        <div class="window-panel window-panel-right">
          <div class="city-flow city-flow-slow"></div>
          <div class="light-flow light-flow-medium"></div>
        </div>
      </div>

      <canvas class="highlight-layer" width="1672" height="941" aria-hidden="true"></canvas>
      <canvas class="highlight-layer" width="1672" height="941" aria-hidden="true"></canvas>
      <canvas class="highlight-layer" width="1672" height="941" aria-hidden="true"></canvas>
      <canvas class="highlight-layer" width="1672" height="941" aria-hidden="true"></canvas>
      <canvas class="highlight-layer" width="1672" height="941" aria-hidden="true"></canvas>

      <div
        class="destination-label"
        id="destinationLabel"
        role="status"
        aria-live="polite"
      ></div>

      <div class="submenu" id="submenu" aria-hidden="true">
        <div class="submenu-heading" id="submenuHeading"></div>
        <div class="submenu-links" id="submenuLinks"></div>
        <button
          class="submenu-close"
          id="submenuClose"
          type="button"
          aria-label="サブメニューを閉じる"
        >×</button>
      </div>

      <div class="loading-message" id="loadingMessage">
        画像とマスクを読み込んでいます…
      </div>
    </div>

    <nav class="keyboard-links" aria-label="リンク一覧">
      <a>Photography Gallery</a>
      <a>Novel Archive</a>
      <a>Creative Works</a>
      <a>Music Channel</a>
      <a>Social Media</a>
    </nav>
  </main>

  <script>
    (() => {
      "use strict";

      const WIDTH = 1672;
      const HEIGHT = 941;
      const ALPHA_THRESHOLD = 34;

      /*
       * 左から順番に設定します。
       *
       * label     : 人物へマウスを重ねたときと、サブメニュー上部に表示する名称
       * links     : サブメニューに表示するリンク
       * transform : マスクの位置と大きさ
       */
      const characters = [
        {
          mask: "./masks/character-01.png",
          label: "Photography Gallery",
          transform: { x: -73, y: 5, scale: 0.991 },
          links: [],
          comingSoon: true
        },
        {
          mask: "./masks/character-02.png",
          label: "Novel Archive",
          transform: { x: -88, y: 112, scale: 0.830 },
          links: [
            {
              label: "EclipseLizard",
              url: "https://eclipselizard.tumblr.com/"
            }
          ]
        },
        {
          mask: "./masks/character-03.png",
          label: "Creative Works",
          transform: { x: 0, y: 0, scale: 1.000 },
          links: [
            {
              label: "FFXIV Adventurer's Scrapbook",
              url: "https://scaledwonderer-droid.github.io/Scrapbook/"
            },
            {
              label: "RPcards",
              url: "https://scaledwonderer-droid.github.io/RPcards/"
            }
          ],
          stackedLinks: true
        },
        {
          mask: "./masks/character-04.png",
          label: "Music Channel",
          transform: { x: 86, y: -2, scale: 0.985 },
          links: [],
          comingSoon: true
        },
        {
          mask: "./masks/character-05.png",
          label: "Social Media",
          transform: { x: 57, y: 25, scale: 0.930 },
          links: [
            {
              label: "Profile",
              url: null
            },
            {
              label: "X",
              url: "https://x.com/theodoreRamuh"
            }
          ]
        }
      ];

      const scene = document.getElementById("scene");
      const backgroundImage = document.getElementById("backgroundImage");
      const canvases = [...document.querySelectorAll(".highlight-layer")];
      const label = document.getElementById("destinationLabel");
      const submenu = document.getElementById("submenu");
      const submenuHeading = document.getElementById("submenuHeading");
      const submenuLinks = document.getElementById("submenuLinks");
      const submenuClose = document.getElementById("submenuClose");
      const loadingMessage = document.getElementById("loadingMessage");
      const keyboardLinks = [...document.querySelectorAll(".keyboard-links a")];

      const isTouchLike = window.matchMedia(
        "(hover: none), (pointer: coarse)"
      ).matches;

      let activeIndex = -1;
      let menuIndex = -1;
      let ready = false;
      let pointerInside = false;

      function loadImage(src) {
        return new Promise((resolve, reject) => {
          const image = new Image();
          image.decoding = "async";
          image.onload = () => resolve(image);
          image.onerror = () => reject(new Error(`読み込み失敗: ${src}`));
          image.src = src;
        });
      }

      function waitForBackground() {
        if (backgroundImage.complete && backgroundImage.naturalWidth > 0) {
          return Promise.resolve(backgroundImage);
        }

        return new Promise((resolve, reject) => {
          backgroundImage.addEventListener(
            "load",
            () => resolve(backgroundImage),
            { once: true }
          );

          backgroundImage.addEventListener(
            "error",
            () => reject(new Error("cyber-train.pngを読み込めませんでした。")),
            { once: true }
          );
        });
      }

      function drawMaskWithTransform(context, maskImage, transform) {
        context.clearRect(0, 0, WIDTH, HEIGHT);
        context.save();
        context.translate(
          WIDTH / 2 + transform.x,
          HEIGHT / 2 + transform.y
        );
        context.scale(transform.scale, transform.scale);
        context.drawImage(
          maskImage,
          -WIDTH / 2,
          -HEIGHT / 2,
          WIDTH,
          HEIGHT
        );
        context.restore();
      }

      function createMaskAlpha(maskImage, transform) {
        const canvas = document.createElement("canvas");
        canvas.width = WIDTH;
        canvas.height = HEIGHT;

        const context = canvas.getContext(
          "2d",
          { willReadFrequently: true }
        );

        drawMaskWithTransform(context, maskImage, transform);

        const imageData = context.getImageData(0, 0, WIDTH, HEIGHT);
        const data = imageData.data;
        const alpha = new Uint8ClampedArray(WIDTH * HEIGHT);

        for (
          let pixel = 0, index = 0;
          pixel < alpha.length;
          pixel += 1, index += 4
        ) {
          const luminance = Math.round(
            data[index] * 0.2126 +
            data[index + 1] * 0.7152 +
            data[index + 2] * 0.0722
          );

          alpha[pixel] = luminance;
        }

        return alpha;
      }

      function buildHighlight(canvas, maskImage, transform) {
        const context = canvas.getContext(
          "2d",
          { willReadFrequently: true }
        );

        context.clearRect(0, 0, WIDTH, HEIGHT);
        context.drawImage(backgroundImage, 0, 0, WIDTH, HEIGHT);

        const highlightData = context.getImageData(0, 0, WIDTH, HEIGHT);

        const maskCanvas = document.createElement("canvas");
        maskCanvas.width = WIDTH;
        maskCanvas.height = HEIGHT;

        const maskContext = maskCanvas.getContext(
          "2d",
          { willReadFrequently: true }
        );

        drawMaskWithTransform(maskContext, maskImage, transform);

        const maskData = maskContext.getImageData(
          0,
          0,
          WIDTH,
          HEIGHT
        ).data;

        const pixels = highlightData.data;

        for (let index = 0; index < pixels.length; index += 4) {
          const luminance = Math.round(
            maskData[index] * 0.2126 +
            maskData[index + 1] * 0.7152 +
            maskData[index + 2] * 0.0722
          );

          pixels[index + 3] = luminance;
        }

        context.putImageData(highlightData, 0, 0);
      }

      function pointToImageCoordinates(event) {
        const rect = scene.getBoundingClientRect();

        return {
          x: Math.max(
            0,
            Math.min(
              WIDTH - 1,
              Math.floor(
                (event.clientX - rect.left) * WIDTH / rect.width
              )
            )
          ),
          y: Math.max(
            0,
            Math.min(
              HEIGHT - 1,
              Math.floor(
                (event.clientY - rect.top) * HEIGHT / rect.height
              )
            )
          )
        };
      }

      function characterAt(x, y) {
        const pixel = y * WIDTH + x;

        for (
          let index = characters.length - 1;
          index >= 0;
          index -= 1
        ) {
          if (characters[index].alpha[pixel] >= ALPHA_THRESHOLD) {
            return index;
          }
        }

        return -1;
      }

      function showCharacter(index) {
        canvases.forEach((canvas, canvasIndex) => {
          canvas.classList.toggle(
            "is-visible",
            canvasIndex === index
          );
        });

        activeIndex = index;

        if (index < 0) {
          label.classList.remove("is-visible");
          scene.style.cursor = "default";
          return;
        }

        label.textContent = characters[index].label;
        label.classList.add("is-visible");
        scene.style.cursor = "pointer";
      }

      function closeSubmenu({ clearHighlight = false } = {}) {
        menuIndex = -1;
        submenu.classList.remove("is-visible");
        submenu.setAttribute("aria-hidden", "true");
        submenuLinks.innerHTML = "";

        if (clearHighlight) {
          showCharacter(-1);
        }
      }

      function openSubmenu(index) {
        const character = characters[index];

        menuIndex = index;
        submenuHeading.textContent = character.label;
        submenuLinks.innerHTML = "";
        submenuLinks.classList.toggle(
          "is-stacked",
          character.stackedLinks === true
        );

        if (character.comingSoon === true || character.links.length === 0) {
          const message = document.createElement("div");
          message.className = "coming-soon";
          message.textContent = "Coming soon";
          submenuLinks.appendChild(message);
        } else {
          character.links.forEach((item) => {
            const hasUrl = typeof item.url === "string" && item.url.trim() !== "";
            const entry = document.createElement(hasUrl ? "a" : "span");

            entry.className = "submenu-link";
            entry.textContent = item.label;

            if (hasUrl) {
              entry.href = item.url;

              if (/^https?:\/\//i.test(item.url)) {
                entry.target = "_blank";
                entry.rel = "noopener noreferrer";
              }
            } else {
              entry.classList.add("is-disabled");
              entry.setAttribute("aria-disabled", "true");
              entry.title = "リンク先は未設定です";
            }

            submenuLinks.appendChild(entry);
          });
        }

        submenu.classList.add("is-visible");
        submenu.setAttribute("aria-hidden", "false");
        showCharacter(index);
      }

      scene.addEventListener("pointerenter", () => {
        pointerInside = true;
      });

      scene.addEventListener("pointerleave", () => {
        pointerInside = false;

        if (!isTouchLike && menuIndex < 0) {
          showCharacter(-1);
        }
      });

      scene.addEventListener("pointermove", (event) => {
        if (!ready || isTouchLike || menuIndex >= 0) {
          return;
        }

        const point = pointToImageCoordinates(event);
        showCharacter(characterAt(point.x, point.y));
      });

      scene.addEventListener("click", (event) => {
        if (!ready) {
          return;
        }

        if (event.target.closest(".submenu")) {
          return;
        }

        const point = pointToImageCoordinates(event);
        const index = characterAt(point.x, point.y);

        if (index < 0) {
          closeSubmenu({ clearHighlight: true });
          return;
        }

        if (menuIndex === index) {
          closeSubmenu({ clearHighlight: !isTouchLike });
          return;
        }

        openSubmenu(index);
      });

      submenuClose.addEventListener("click", () => {
        closeSubmenu({ clearHighlight: true });
      });

      document.addEventListener("keydown", (event) => {
        if (event.key === "Escape") {
          closeSubmenu({ clearHighlight: true });
        }
      });

      keyboardLinks.forEach((link, index) => {
        const character = characters[index];
        const firstLink = character.links[0];

        link.textContent = character.label;

        if (firstLink && typeof firstLink.url === "string" && firstLink.url.trim() !== "") {
          link.href = firstLink.url;
        } else {
          link.removeAttribute("href");
          link.setAttribute("aria-disabled", "true");
          link.tabIndex = -1;
        }

        link.addEventListener("focus", () => {
          if (ready) {
            showCharacter(index);
          }
        });

        link.addEventListener("blur", () => {
          if (ready && !pointerInside && menuIndex < 0) {
            showCharacter(-1);
          }
        });
      });

      Promise.all([
        waitForBackground(),
        ...characters.map((character) => loadImage(character.mask))
      ])
        .then((loaded) => {
          const maskImages = loaded.slice(1);

          maskImages.forEach((maskImage, index) => {
            characters[index].alpha = createMaskAlpha(
              maskImage,
              characters[index].transform
            );

            buildHighlight(
              canvases[index],
              maskImage,
              characters[index].transform
            );
          });

          ready = true;
          loadingMessage.hidden = true;
        })
        .catch((error) => {
          console.error(error);

          loadingMessage.innerHTML =
            "画像を読み込めませんでした。<br>" +
            "index.html、cyber-train.png、masksフォルダの配置とファイル名を確認してください。";
        });
    })();
  </script>
</body>
</html>
