<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="color-scheme" content="dark">
  <title>Cyber Train Links - Mask Adjuster</title>
  <style>
    :root {
      --label-bg: rgba(5, 9, 19, 0.84);
      --label-border: rgba(174, 225, 255, 0.46);
      --label-text: #f7fbff;
      --transition: 180ms ease;
    }

    * { box-sizing: border-box; }

    html, body {
      width: 100%;
      min-height: 100%;
      margin: 0;
      background: radial-gradient(circle at 50% 42%, #12182a 0%, #070910 58%, #020307 100%);
    }

    body {
      min-height: 100svh;
      display: grid;
      place-items: center;
      overflow: hidden;
      color: var(--label-text);
      font-family: Inter, "Noto Sans JP", "Yu Gothic UI", "Yu Gothic", Meiryo, sans-serif;
    }

    .page {
      width: 100vw;
      height: 100svh;
      display: grid;
      place-items: center;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    }

    .scene {
      position: relative;
      width: min(100vw, calc(100svh * 1672 / 941));
      aspect-ratio: 1672 / 941;
      max-height: 100svh;
      overflow: hidden;
      background: #03050a;
      user-select: none;
      -webkit-user-select: none;
      touch-action: manipulation;
      cursor: default;
    }

    .background, .highlight-layer {
      position: absolute;
      inset: 0;
      display: block;
      width: 100%;
      height: 100%;
    }

    .background {
      object-fit: fill;
      pointer-events: none;
    }

    .highlight-layer {
      opacity: 0;
      pointer-events: none;
      transition: opacity var(--transition);
      mix-blend-mode: screen;
      filter:
        brightness(1.50)
        contrast(1.08)
        saturate(1.22)
        drop-shadow(0 0 3px rgba(240, 252, 255, 1))
        drop-shadow(0 0 8px rgba(173, 231, 255, 0.98))
        drop-shadow(0 0 18px rgba(88, 174, 255, 0.92))
        drop-shadow(0 0 36px rgba(89, 103, 255, 0.56));
    }

    .highlight-layer.is-visible { opacity: 1; }

    .destination-label {
      position: absolute;
      left: 50%;
      bottom: clamp(14px, 3.2vw, 42px);
      z-index: 20;
      max-width: min(88%, 760px);
      padding: 11px 18px 12px;
      border: 1px solid var(--label-border);
      border-radius: 999px;
      background: var(--label-bg);
      box-shadow: 0 0 24px rgba(83, 156, 255, 0.18), inset 0 0 16px rgba(154, 216, 255, 0.04);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      color: var(--label-text);
      font-size: clamp(13px, 1.25vw, 20px);
      font-weight: 600;
      letter-spacing: 0.08em;
      line-height: 1.35;
      text-align: center;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      opacity: 0;
      transform: translate(-50%, 10px);
      transition: opacity var(--transition), transform var(--transition);
      pointer-events: none;
    }

    .destination-label.is-visible {
      opacity: 1;
      transform: translate(-50%, 0);
    }

    .tap-guide {
      position: absolute;
      left: 50%;
      bottom: calc(clamp(14px, 3.2vw, 42px) + 52px);
      z-index: 20;
      padding: 5px 10px;
      border-radius: 999px;
      background: rgba(3, 7, 15, 0.76);
      color: rgba(234, 246, 255, 0.84);
      font-size: 11px;
      letter-spacing: 0.04em;
      opacity: 0;
      transform: translate(-50%, 8px);
      transition: opacity var(--transition), transform var(--transition);
      pointer-events: none;
    }

    .tap-guide.is-visible {
      opacity: 1;
      transform: translate(-50%, 0);
    }

    .loading-message {
      position: absolute;
      inset: 0;
      z-index: 30;
      display: grid;
      place-items: center;
      padding: 24px;
      background: #090b11;
      color: #fff;
      text-align: center;
      line-height: 1.8;
    }

    .loading-message[hidden] { display: none; }

    .debug-panel {
      position: fixed;
      right: 16px;
      top: 16px;
      z-index: 100;
      width: min(360px, calc(100vw - 32px));
      padding: 14px;
      border: 1px solid rgba(167, 221, 255, 0.35);
      border-radius: 14px;
      background: rgba(7, 11, 19, 0.82);
      box-shadow: 0 0 24px rgba(0, 0, 0, 0.25);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      font-size: 13px;
      line-height: 1.45;
    }

    .debug-panel h2 {
      margin: 0;
      font-size: 15px;
    }

    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 10px;
    }

    .panel-actions {
      display: flex;
      gap: 6px;
    }

    .panel-actions button {
      width: auto;
      padding: 6px 9px;
      font-size: 12px;
    }

    .debug-panel.is-left {
      right: auto;
      left: 16px;
    }

    .debug-panel.is-hidden {
      display: none;
    }

    .show-panel-button {
      position: fixed;
      right: 16px;
      top: 16px;
      z-index: 101;
      display: none;
      width: auto;
      border: 1px solid rgba(167,221,255,0.35);
      border-radius: 999px;
      background: rgba(7,11,19,0.86);
      color: #f5fbff;
      padding: 9px 13px;
      cursor: pointer;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    .show-panel-button.is-visible {
      display: block;
    }

    .debug-panel .row { margin-bottom: 10px; }
    .debug-panel label { display: block; margin-bottom: 4px; }
    .debug-panel select,
    .debug-panel input[type="range"],
    .debug-panel textarea,
    .debug-panel button {
      width: 100%;
    }

    .debug-panel textarea {
      min-height: 150px;
      resize: vertical;
      background: rgba(0,0,0,0.28);
      color: #eaf5ff;
      border: 1px solid rgba(167,221,255,0.28);
      border-radius: 8px;
      padding: 8px;
      font-family: ui-monospace, SFMono-Regular, Consolas, monospace;
      font-size: 12px;
    }

    .debug-panel .value {
      font-weight: 700;
      color: #b7e8ff;
      margin-left: 6px;
    }

    .debug-panel .buttons {
      display: grid;
      gap: 8px;
      grid-template-columns: 1fr 1fr;
    }

    .debug-panel button {
      border: 1px solid rgba(167,221,255,0.28);
      border-radius: 10px;
      background: rgba(255,255,255,0.05);
      color: #f5fbff;
      padding: 8px 10px;
      cursor: pointer;
    }

    .debug-panel .hint {
      opacity: 0.82;
      font-size: 12px;
    }

    .keyboard-links {
      position: fixed;
      left: -10000px;
      top: auto;
      width: 1px;
      height: 1px;
      overflow: hidden;
    }

    @media (max-width: 900px) {
      .debug-panel {
        left: 12px;
        right: 12px;
        top: auto;
        bottom: 12px;
        width: auto;
        max-height: 45svh;
        overflow: auto;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <div class="scene" id="scene" role="application" aria-label="サイバーパンク列車のリンク画面。人物を選択すると対応するリンクへ移動します。">
      <img class="background" id="backgroundImage" src="./cyber-train.png" width="1672" height="941" alt="サイバーパンク都市を走る列車内の5人" draggable="false">
      <canvas class="highlight-layer" width="1672" height="941" aria-hidden="true"></canvas>
      <canvas class="highlight-layer" width="1672" height="941" aria-hidden="true"></canvas>
      <canvas class="highlight-layer" width="1672" height="941" aria-hidden="true"></canvas>
      <canvas class="highlight-layer" width="1672" height="941" aria-hidden="true"></canvas>
      <canvas class="highlight-layer" width="1672" height="941" aria-hidden="true"></canvas>
      <div class="destination-label" id="destinationLabel" role="status" aria-live="polite"></div>
      <div class="tap-guide" id="tapGuide" aria-hidden="true">もう一度タップして移動</div>
      <div class="loading-message" id="loadingMessage">画像とマスクを読み込んでいます…</div>
    </div>

    <nav class="keyboard-links" aria-label="リンク一覧">
      <a href="https://example.com/photography">Photography Gallery</a>
      <a href="https://example.com/novels">Novel Archive</a>
      <a href="https://example.com/creative">Creative Works</a>
      <a href="https://example.com/music">Music Channel</a>
      <a href="https://example.com/social">Social Media</a>
    </nav>
  </main>

  <aside class="debug-panel">
    <div class="panel-header">
      <h2>マスク位置調整</h2>
      <div class="panel-actions">
        <button id="movePanelButton" type="button">左右移動</button>
        <button id="hidePanelButton" type="button">隠す</button>
      </div>
    </div>

    <div class="row">
      <label for="characterSelect">人物</label>
      <select id="characterSelect"></select>
    </div>

    <div class="row">
      <label for="offsetX">X移動 <span class="value" id="offsetXValue">0</span></label>
      <input id="offsetX" type="range" min="-800" max="800" step="1" value="0">
    </div>

    <div class="row">
      <label for="offsetY">Y移動 <span class="value" id="offsetYValue">0</span></label>
      <input id="offsetY" type="range" min="-800" max="800" step="1" value="0">
    </div>

    <div class="row">
      <label for="scale">拡大率 <span class="value" id="scaleValue">1.000</span></label>
      <input id="scale" type="range" min="0.300" max="2.000" step="0.001" value="1.000">
    </div>

    <div class="buttons row">
      <button id="resetCurrentButton" type="button">現在の人物をリセット</button>
      <button id="copyButton" type="button">設定をコピー</button>
    </div>

    <div class="row">
      <label for="configOutput">characters 配列へ戻す設定値</label>
      <textarea id="configOutput" readonly></textarea>
    </div>

    <div class="hint">
      まず人物を選び、スライダーで位置と大きさを合わせてください。<br>
      その後「設定をコピー」を押し、出力された transform 値を本番用HTMLへ戻せます。
    </div>
  </aside>

  <button class="show-panel-button" id="showPanelButton" type="button">調整窓を表示</button>

  <script>
    (() => {
      "use strict";

      const WIDTH = 1672;
      const HEIGHT = 941;
      const ALPHA_THRESHOLD = 34;

      const characters = [
        { mask: "./masks/character-01.png", url: "https://example.com/photography", label: "Photography Gallery", name: "1: 写真家", transform: { x: 0, y: 0, scale: 1 } },
        { mask: "./masks/character-02.png", url: "https://example.com/novels",      label: "Novel Archive",       name: "2: 小説家", transform: { x: 0, y: 0, scale: 1 } },
        { mask: "./masks/character-03.png", url: "https://example.com/creative",    label: "Creative Works",     name: "3: クリエイター", transform: { x: 0, y: 0, scale: 1 } },
        { mask: "./masks/character-04.png", url: "https://example.com/music",       label: "Music Channel",      name: "4: 音楽家", transform: { x: 0, y: 0, scale: 1 } },
        { mask: "./masks/character-05.png", url: "https://example.com/social",      label: "Social Media",       name: "5: SNSマネージャー", transform: { x: 0, y: 0, scale: 1 } }
      ];

      const scene = document.getElementById("scene");
      const backgroundImage = document.getElementById("backgroundImage");
      const canvases = [...document.querySelectorAll(".highlight-layer")];
      const label = document.getElementById("destinationLabel");
      const tapGuide = document.getElementById("tapGuide");
      const loadingMessage = document.getElementById("loadingMessage");
      const keyboardLinks = [...document.querySelectorAll(".keyboard-links a")];

      const characterSelect = document.getElementById("characterSelect");
      const offsetXInput = document.getElementById("offsetX");
      const offsetYInput = document.getElementById("offsetY");
      const scaleInput = document.getElementById("scale");
      const offsetXValue = document.getElementById("offsetXValue");
      const offsetYValue = document.getElementById("offsetYValue");
      const scaleValue = document.getElementById("scaleValue");
      const configOutput = document.getElementById("configOutput");
      const resetCurrentButton = document.getElementById("resetCurrentButton");
      const copyButton = document.getElementById("copyButton");
      const debugPanel = document.querySelector(".debug-panel");
      const movePanelButton = document.getElementById("movePanelButton");
      const hidePanelButton = document.getElementById("hidePanelButton");
      const showPanelButton = document.getElementById("showPanelButton");

      const isTouchLike = window.matchMedia("(hover: none), (pointer: coarse)").matches;

      let activeIndex = -1;
      let selectedIndex = -1;
      let ready = false;
      let pointerInside = false;
      let editingIndex = 0;
      let maskImages = [];

      function loadImage(src) {
        return new Promise((resolve, reject) => {
          const image = new Image();
          image.decoding = "async";
          image.onload = () => resolve(image);
          image.onerror = () => reject(new Error(`読み込み失敗: ${src}`));
          image.src = src;
        });
      }

      function waitForBackground() {
        if (backgroundImage.complete && backgroundImage.naturalWidth > 0) {
          return Promise.resolve(backgroundImage);
        }

        return new Promise((resolve, reject) => {
          backgroundImage.addEventListener("load", () => resolve(backgroundImage), { once: true });
          backgroundImage.addEventListener("error", () => reject(new Error("cyber-train.pngを読み込めませんでした。")), { once: true });
        });
      }

      function drawMaskWithTransform(context, maskImage, transform) {
        context.clearRect(0, 0, WIDTH, HEIGHT);
        context.save();
        context.translate(WIDTH / 2 + transform.x, HEIGHT / 2 + transform.y);
        context.scale(transform.scale, transform.scale);
        context.drawImage(maskImage, -WIDTH / 2, -HEIGHT / 2, WIDTH, HEIGHT);
        context.restore();
      }

      function createMaskAlpha(maskImage, transform) {
        const canvas = document.createElement("canvas");
        canvas.width = WIDTH;
        canvas.height = HEIGHT;

        const context = canvas.getContext("2d", { willReadFrequently: true });
        drawMaskWithTransform(context, maskImage, transform);

        const imageData = context.getImageData(0, 0, WIDTH, HEIGHT);
        const data = imageData.data;
        const alpha = new Uint8ClampedArray(WIDTH * HEIGHT);

        for (let pixel = 0, index = 0; pixel < alpha.length; pixel += 1, index += 4) {
          const luminance = Math.round(
            data[index] * 0.2126 +
            data[index + 1] * 0.7152 +
            data[index + 2] * 0.0722
          );
          alpha[pixel] = luminance;
        }

        return alpha;
      }

      function buildHighlight(canvas, maskImage, transform) {
        const context = canvas.getContext("2d", { willReadFrequently: true });
        context.clearRect(0, 0, WIDTH, HEIGHT);
        context.drawImage(backgroundImage, 0, 0, WIDTH, HEIGHT);

        const highlightData = context.getImageData(0, 0, WIDTH, HEIGHT);
        const maskCanvas = document.createElement("canvas");
        maskCanvas.width = WIDTH;
        maskCanvas.height = HEIGHT;

        const maskContext = maskCanvas.getContext("2d", { willReadFrequently: true });
        drawMaskWithTransform(maskContext, maskImage, transform);

        const maskData = maskContext.getImageData(0, 0, WIDTH, HEIGHT).data;
        const pixels = highlightData.data;

        for (let index = 0; index < pixels.length; index += 4) {
          const luminance = Math.round(
            maskData[index] * 0.2126 +
            maskData[index + 1] * 0.7152 +
            maskData[index + 2] * 0.0722
          );
          pixels[index + 3] = luminance;
        }

        context.putImageData(highlightData, 0, 0);
      }

      function rebuildCharacter(index) {
        characters[index].alpha = createMaskAlpha(maskImages[index], characters[index].transform);
        buildHighlight(canvases[index], maskImages[index], characters[index].transform);
      }

      function rebuildAll() {
        characters.forEach((_, index) => rebuildCharacter(index));
      }

      function pointToImageCoordinates(event) {
        const rect = scene.getBoundingClientRect();
        return {
          x: Math.max(0, Math.min(WIDTH - 1, Math.floor((event.clientX - rect.left) * WIDTH / rect.width))),
          y: Math.max(0, Math.min(HEIGHT - 1, Math.floor((event.clientY - rect.top) * HEIGHT / rect.height)))
        };
      }

      function characterAt(x, y) {
        const pixel = y * WIDTH + x;
        for (let index = characters.length - 1; index >= 0; index -= 1) {
          if (characters[index].alpha[pixel] >= ALPHA_THRESHOLD) {
            return index;
          }
        }
        return -1;
      }

      function showCharacter(index, showTapGuide = false) {
        canvases.forEach((canvas, canvasIndex) => {
          canvas.classList.toggle("is-visible", canvasIndex === index);
        });

        activeIndex = index;

        if (index < 0) {
          label.classList.remove("is-visible");
          tapGuide.classList.remove("is-visible");
          scene.style.cursor = "default";
          return;
        }

        label.textContent = characters[index].label;
        label.classList.add("is-visible");
        tapGuide.classList.toggle("is-visible", showTapGuide);
        scene.style.cursor = "pointer";
      }

      function clearSelection() {
        selectedIndex = -1;
        showCharacter(-1, false);
      }

      function refreshConfigOutput() {
        const lines = characters.map((character, index) => {
          const t = character.transform;
          return `  { mask: "${character.mask}", url: "${character.url}", label: "${character.label}", transform: { x: ${t.x}, y: ${t.y}, scale: ${t.scale.toFixed(3)} } }${index === characters.length - 1 ? "" : ","}`;
        });
        configOutput.value = "[\n" + lines.join("\n") + "\n]";
      }

      function syncControlsFromCharacter() {
        const transform = characters[editingIndex].transform;
        offsetXInput.value = String(transform.x);
        offsetYInput.value = String(transform.y);
        scaleInput.value = String(transform.scale.toFixed(3));
        offsetXValue.textContent = String(transform.x);
        offsetYValue.textContent = String(transform.y);
        scaleValue.textContent = Number(transform.scale).toFixed(3);
        showCharacter(editingIndex, false);
      }

      function applyControlsToCharacter() {
        const transform = characters[editingIndex].transform;
        transform.x = Number(offsetXInput.value);
        transform.y = Number(offsetYInput.value);
        transform.scale = Number(scaleInput.value);

        offsetXValue.textContent = String(transform.x);
        offsetYValue.textContent = String(transform.y);
        scaleValue.textContent = Number(transform.scale).toFixed(3);

        if (ready) {
          rebuildCharacter(editingIndex);
          showCharacter(editingIndex, false);
        }

        refreshConfigOutput();
      }

      characters.forEach((character, index) => {
        const option = document.createElement("option");
        option.value = String(index);
        option.textContent = character.name;
        characterSelect.appendChild(option);
      });

      characterSelect.addEventListener("change", () => {
        editingIndex = Number(characterSelect.value);

        if (editingIndex === 4) {
          debugPanel.classList.add("is-left");
          movePanelButton.textContent = "右へ移動";
        }

        syncControlsFromCharacter();
      });

      offsetXInput.addEventListener("input", applyControlsToCharacter);
      offsetYInput.addEventListener("input", applyControlsToCharacter);
      scaleInput.addEventListener("input", applyControlsToCharacter);

      resetCurrentButton.addEventListener("click", () => {
        characters[editingIndex].transform = { x: 0, y: 0, scale: 1 };
        syncControlsFromCharacter();
        applyControlsToCharacter();
      });

      copyButton.addEventListener("click", async () => {
        try {
          await navigator.clipboard.writeText(configOutput.value);
          copyButton.textContent = "コピーしました";
          setTimeout(() => {
            copyButton.textContent = "設定をコピー";
          }, 1200);
        } catch (error) {
          alert("コピーできませんでした。出力欄を手動でコピーしてください。");
        }
      });

      movePanelButton.addEventListener("click", () => {
        debugPanel.classList.toggle("is-left");
        movePanelButton.textContent = debugPanel.classList.contains("is-left")
          ? "右へ移動"
          : "左へ移動";
      });

      hidePanelButton.addEventListener("click", () => {
        debugPanel.classList.add("is-hidden");
        showPanelButton.classList.add("is-visible");
      });

      showPanelButton.addEventListener("click", () => {
        debugPanel.classList.remove("is-hidden");
        showPanelButton.classList.remove("is-visible");
      });

      scene.addEventListener("pointerenter", () => { pointerInside = true; });

      scene.addEventListener("pointerleave", () => {
        pointerInside = false;
        if (!isTouchLike) {
          showCharacter(editingIndex, false);
        }
      });

      scene.addEventListener("pointermove", (event) => {
        if (!ready || isTouchLike) return;
        const point = pointToImageCoordinates(event);
        const index = characterAt(point.x, point.y);
        if (index >= 0) {
          showCharacter(index, false);
        } else {
          showCharacter(editingIndex, false);
        }
      });

      scene.addEventListener("click", (event) => {
        if (!ready) return;
        const point = pointToImageCoordinates(event);
        const index = characterAt(point.x, point.y);

        if (index < 0) {
          if (isTouchLike) clearSelection();
          return;
        }

        if (!isTouchLike) {
          window.location.href = characters[index].url;
          return;
        }

        if (selectedIndex !== index) {
          selectedIndex = index;
          showCharacter(index, true);
          return;
        }

        window.location.href = characters[index].url;
      });

      keyboardLinks.forEach((link, index) => {
        link.href = characters[index].url;
        link.textContent = characters[index].label;

        link.addEventListener("focus", () => {
          if (ready) showCharacter(index, false);
        });

        link.addEventListener("blur", () => {
          if (ready && !pointerInside) showCharacter(editingIndex, false);
        });
      });

      Promise.all([waitForBackground(), ...characters.map((character) => loadImage(character.mask))])
        .then((loaded) => {
          maskImages = loaded.slice(1);
          rebuildAll();
          ready = true;
          loadingMessage.hidden = true;
          refreshConfigOutput();
          syncControlsFromCharacter();
        })
        .catch((error) => {
          console.error(error);
          loadingMessage.innerHTML =
            "画像を読み込めませんでした。<br>" +
            "index.html、cyber-train.png、masksフォルダの配置とファイル名を確認してください。";
        });
    })();
  </script>
</body>
</html>
